<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Wine Buddy{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="nav-brand">
        <span class="nav-icon">&#127863;</span> Wine Buddy
      </a>
      <button class="nav-toggle" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('open')">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-links">
        <a href="/find-similar" class="{% if request.path == '/find-similar' or request.path == '/' %}active{% endif %}">Find Similar</a>
        <a href="/pair-to-food" class="{% if request.path == '/pair-to-food' %}active{% endif %}">Pair to Food</a>
        <a href="#" class="disabled" title="Coming soon">Explore</a>
        <button class="theme-toggle" aria-label="Toggle dark mode" onclick="toggleTheme()">
          <span class="theme-icon"></span>
        </button>
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <p>Wine Buddy &mdash; open-source wine analysis &middot; <a href="/privacy" class="footer-link">Privacy</a></p>
  </footer>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const dark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', dark ? 'light' : 'dark');
      localStorage.setItem('theme', dark ? 'light' : 'dark');
    }
    // restore saved preference
    (function() {
      const saved = localStorage.getItem('theme')
        || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', saved);
    })();
  </script>
</body>
</html>
